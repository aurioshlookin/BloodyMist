        function decryptApp() {
            const pass = document.getElementById('auth-input').value.trim().toLowerCase();
            try {
                // 1. Descriptografa
                const decryptedStr = CryptoJS.AES.decrypt(payload, pass).toString(CryptoJS.enc.Utf8);
                if(!decryptedStr) throw new Error("Falha na decodificação");
                
                // 2. Converte de volta para objeto
                const parsedData = JSON.parse(decryptedStr);
                
                // 3. Monta o HTML
                document.getElementById('app-root').innerHTML = parsedData.html;
                
                // 4. Injeta a inteligência (Javascript) do site de forma invisível
                const scriptEl = document.createElement('script');
                scriptEl.textContent = parsedData.js;
                document.body.appendChild(scriptEl);
                
                // 5. Remove o bloqueio visual
                const overlay = document.getElementById('auth-overlay');
                const appRoot = document.getElementById('app-root');
                const body = document.getElementById('body-wrap');

                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 1000);

                appRoot.classList.remove('opacity-0', 'blur-xl', 'pointer-events-none', 'h-screen', 'overflow-hidden');
                body.classList.remove('overflow-hidden', 'flex', 'items-center', 'justify-center');
                
                // Inicia os ícones do lucide no novo HTML
                lucide.createIcons();
            } catch(e) {
                const err = document.getElementById('auth-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        window.addEventListener('load', () => {
            document.getElementById('auth-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') decryptApp();
            });
            lucide.createIcons();
        });
    </script>
</body>
</html>
